name: Download Latest Fuel PDF

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Run downloader script
        run: python code_for_download.py

      - name: Commit and push if new PDF
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add pdf_files/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update fuel PDFs"
          git push https://$GH_PAT@github.com/Nik2014/fuel_prices.git main
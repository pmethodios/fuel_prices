name: Download and Merge Fuel Data

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:

jobs:
  download-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber pandas openpyxl datawrapper

      - name: Run downloader script
        run: python national/code_for_download.py

      - name: Merge latest PDF data into XLSX
        run: python national/merge_to_file.py

      - name: Generate prefecture CSV
        run: python prefectures/latest_only/pref_today.py
      
      - name: Update the prefecture data CSV
        run: python prefectures/update_master/pref_master_update.py

      - name: Update Datawrapper Charts and Export PNGs
        run: python datawrapper_api/update_chart.py
        env:
          DATAWRAPPER_API: ${{ secrets.DATAWRAPPER_API }}

      - name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.FUEL_PAT }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # -----------------------
          # FIX FILE LOCATIONS (IMPORTANT)
          # -----------------------

          # Move files if they were created in root
          [ -f prices_of_petrol.csv ] && mv prices_of_petrol.csv national/
          [ -f prices_of_petrol.xlsx ] && mv prices_of_petrol.xlsx national/
          [ -f pref_latest.csv ] && mv pref_latest.csv prefectures/latest_only/
          [ -f master_pref_upd.csv ] && mv master_pref_upd.csv prefectures/update_master/

          # Move folders if created in root
          [ -d temp_images ] && mv temp_images/* datawrapper_api/temp_images/ || true
          [ -d pdf_files ] && mv pdf_files/* national/pdf_files/ || true
          [ -d pdfs_pref ] && mv pdfs_pref/* prefectures/pdfs_pref/ || true

          # -----------------------
          # ADD FILES
          # -----------------------

          git add \
            national/pdf_files/ \
            national/prices_of_petrol.xlsx \
            national/prices_of_petrol.csv \
            prefectures/latest_only/pref_latest.csv \
            prefectures/update_master/master_pref_upd.csv \
            prefectures/pdfs_pref/ \
            datawrapper_api/temp_images/

          # -----------------------
          # COMMIT & PUSH
          # -----------------------

          git commit -m "Update fuel data (national + prefecture + charts)" || echo "No changes to commit"

          git push https://$GH_PAT@github.com/Nik2014/fuel_prices.git main
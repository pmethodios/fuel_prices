name: Download and Merge Fuel Data

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:

jobs:
  download-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber pandas openpyxl datawrapper

      - name: Run downloader script
        run: python code_for_download.py

      - name: Merge latest PDF data into XLSX
        run: python merge_to_file.py

      - name: Generate prefecture CSV
        run: python pref_today.py

      # -----------------------
      # NEW STEP: Update Datawrapper charts
      # -----------------------
      - name: Update Datawrapper Charts and Export PNGs
        run: python datawrapper_api/update_chart.py
        env:
          DATAWRAPPER_API: ${{ secrets.DATAWRAPPER_API }}

      - name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.FUEL_PAT }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add pdf_files/ prices_of_petrol.xlsx prices_of_petrol.csv pref_latest.csv temp_images/

          git commit -m "Update fuel data (national + prefecture + charts)" || echo "No changes to commit"

          git push https://$GH_PAT@github.com/Nik2014/fuel_prices.git main